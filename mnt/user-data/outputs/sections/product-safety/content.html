<div class="section-header">
        <div class="section-icon">🔬</div>
        <div>
          <div class="section-title">Product Safety Analyzer</div>
          <div class="section-sub">Detect harmful chemicals, get risk scores & safer alternatives</div>
        </div>
      </div>

      <div class="grid-2">
        <div>
          <div class="card">
            <div class="card-title">Search Product</div>
            <div class="form-group">
              <label>Product Name</label>
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="ana-input" placeholder="e.g. Sprite, Niacinamide Serum, Minoxidil…"
                  oninput="analyzerSuggest(this.value)" autocomplete="off">
              </div>
              <div id="ana-suggestions" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px"></div>
            </div>
            <button class="btn" onclick="runAnalysis()">⚡ Analyze Product</button>
          </div>

          <div class="card mt-4">
            <div class="card-title">Quick Select</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Sprite')">🥤 Sprite</button>
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Diet Coke')">🥤 Diet Coke</button>
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Monster Energy')">⚡ Monster</button>
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Niacinamide Serum')">💆 Niacinamide</button>
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Minoxidil Beard Serum')">🧔 Minoxidil</button>
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Paraffin Wax')">🕯️ Paraffin Wax</button>
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Hair Gel')">💈 Hair Gel</button>
              <button class="btn btn-outline" style="font-size:12px;padding:7px 13px"
                onclick="quickAnalyze('Amul Lassi')">🥛 Amul Lassi</button>
            </div>
          </div>
        </div>

        <div id="analyzer-result-wrap">
          <div class="card flex-center" style="min-height:280px;flex-direction:column;gap:12px;color:var(--text-dim);">
            <div style="font-size:3rem">⚗️</div>
            <p style="font-size:13px;text-align:center">Enter a product name and click<br><strong
                style="color:var(--text-muted)">Analyze Product</strong> to see results</p>
          </div>
        </div>
      </div>
